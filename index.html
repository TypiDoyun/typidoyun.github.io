<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />


        <title>Typidoyun</title>
    </head>
    <body>

        <canvas id="canvas"></canvas>
        <!-- <iframe id="background" frameborder="0" src="https://www.shadertoy.com/embed/43y3zD?gui=false&t=10&paused=false&muted=true" allowfullscreen></iframe> -->
        <h1>Typidoyun</h1>
        <div class="container">
            <div class="item" style="--color: #89ec5b">
                <div class="section" id="section1">
                    <div class="content">
                        <div class="icon">
                            <!-- <ion-icon name="brush"></ion-icon> -->
                            <ion-icon name="logo-instagram"></ion-icon>
                        </div>
                        <div class="text">
                            <h2 class="title">Instagram</h2>
                            <p class="description">
                                You can find information<br />about my daily
                                life<br />and ongoing projects.
                            </p>
                            <a
                                class="button"
                                href="https://www.instagram.com/typi_doyun/"
                                target="_blank"
                                >Visit</a
                            >
                        </div>
                    </div>
                    <div class="line1"></div>
                    <div class="line2"></div>
                    <div class="line3"></div>
                    <div class="line4"></div>
                </div>
                <div class="button-field">
                    <div class="button-content" onclick="move(2)">
                        <span class="align"
                            ><a class="move-button"><span>Next</span></a></span
                        >
                    </div>
                </div>
            </div>
            <div class="item" style="--color: #eb5ae5">
                <div class="section" id="section2">
                    <div class="content">
                        <div class="icon">
                            <!-- <ion-icon name="code-slash-outline"></ion-icon> -->
                            <ion-icon name="logo-github"></ion-icon>
                        </div>
                        <div class="text">
                            <h2 class="title">Github</h2>
                            <p class="description">
                                You can check out<br />my projects on GitHub.<br />Various
                                projects are planned.
                            </p>
                            <a
                                class="button"
                                href="https://github.com/TypiDoyun"
                                target="_blank"
                                >Visit</a
                            >
                        </div>
                    </div>
                    <div class="line1"></div>
                    <div class="line2"></div>
                    <div class="line3"></div>
                    <div class="line4"></div>
                </div>
                <div class="button-field">
                    <div class="button-content" onclick="move(1)">
                        <span class="align"
                            ><a class="move-button"
                                ><span>Previous</span></a
                            ></span
                        >
                    </div>
                    <div class="button-content" onclick="move(3)">
                        <span class="align"
                            ><a class="move-button"><span>Next</span></a></span
                        >
                    </div>
                </div>
            </div>
            <div class="item" style="--color: #5b98eb">
                <div class="section" id="section3">
                    <div class="content">
                        <div class="icon">
                            <ion-icon name="search-outline"></ion-icon>
                        </div>
                        <div class="text">
                            <h2 class="title">Blog</h2>
                            <p class="description">
                                You can check out<br>my activity on my blog
                            </p>
                            <a
                                class="button"
                                href="https://blog.typi.kr"
                                target="_blank"
                                >View</a
                            >
                        </div>
                    </div>
                    <div class="line1"></div>
                    <div class="line2"></div>
                    <div class="line3"></div>
                    <div class="line4"></div>
                </div>
                <div class="button-field">
                    <div class="button-content" onclick="move(2)">
                        <span class="align"
                            ><a class="move-button"
                                ><span>Previous</span></a
                            ></span
                        >
                    </div>
                </div>
            </div>
        </div>

        <script src="spinning-circle/utils/axis.js"></script>
        <script src="spinning-circle/utils/vector.js"></script>
        <script src="spinning-circle/index.js"></script>
        <script src="index.js"></script>
        <script src="shader.js"></script>
        <script>
            

            window.onload = () => {
                const rotateStep = new Vector(
                    toRadians(13),
                    toRadians(21),
                    toRadians(17)
                );
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                initialize(6);
                render(290, 0.75, 120, 300, [155, 155, 155], rotateStep);
            };
            window.onresize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
        </script>
        <script
            type="module"
            src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"
        ></script>
        <script
            nomodule
            src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"
        ></script>
    </body>
</html>
