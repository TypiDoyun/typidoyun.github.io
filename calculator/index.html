<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- import fonts -->
    <link rel="stylesheet" href="fonts.css">

    <!-- import css -->
    <link rel="stylesheet" href="style.css">

    <!-- import ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <title>calculator</title>
</head>
<body>
    <div class="calculator">
        <header>
            <div class="menu">
                <span class="button selected">
                    Calculator
                </span>
                <span class="button">
                    Converter
                </span>
                <span class="button">
                    Finance
                </span>
            </div>
            <hr>
        </header>
        <main>
            <div id="result">
                <div id="formulas">
                    <span id="formula">0</span>
                    <span id="formula-copy">
                        0
                        <span class="cursor">|</span>
                    </span>
                </div>
                <hr>
            </div>
            <div class="pad-section">
                <div class="number-pad">
                    <div class="pad" onclick="addSquare()">x<sup>y</sup></div>
                    <div class="pad" onclick="moveHead('left')">&lt;</div>
                    <div class="pad" onclick="moveHead('right')">&gt;</div>
                    <div class="pad symbol" onclick="backspace()"><ion-icon name="backspace-outline"></ion-icon></div>
    
                    <div class="pad" onclick="addSquare(2)">x<sup>2</sup></div>
                    <div class="pad" onclick="addBracket()">&#40; &#41;</div>
                    <div class="pad" onclick=""></div>
                    <div class="pad symbol" onclick="addCharacter('÷')">÷</div>
    
                    <div class="pad number" onclick="addCharacter('1')">1</div>
                    <div class="pad number" onclick="addCharacter('2')">2</div>
                    <div class="pad number" onclick="addCharacter('3')">3</div>
                    <div class="pad symbol" onclick="addCharacter('×')">×</div>
                    
                    <div class="pad number" onclick="addCharacter('4')">4</div>
                    <div class="pad number" onclick="addCharacter('5')">5</div>
                    <div class="pad number" onclick="addCharacter('6')">6</div>
                    <div class="pad symbol" onclick="addCharacter('-')">-</div>
    
                    <div class="pad number" onclick="addCharacter('7')">7</div>
                    <div class="pad number" onclick="addCharacter('8')">8</div>
                    <div class="pad number" onclick="addCharacter('9')">9</div>
                    <div class="pad symbol" onclick="addCharacter('+')">+</div>
    
                    <div class="pad" onclick="addCharacter('.')">.</div>
                    <div class="pad number zero" onclick="addCharacter('0')">0</div>
                    <div class="pad symbol answer" onclick="getAnswer()">=</div>
                </div>
            </div>
        </main>
    </div>

    <!-- import javascript -->
    <script src="utils/makeDragable.js"></script>
    <script src="utils/operate.js"></script>
    <script src="index.js"></script>
</body>
</html>
