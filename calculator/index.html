<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- import fonts -->
    <link rel="stylesheet" href="fonts.css">

    <!-- import css -->
    <link rel="stylesheet" href="style.css">

    <title>calculator</title>
</head>
<body>
    <div class="calculator">
        <header>
            <div class="menu">
                <span class="button selected">
                    Calculator
                </span>
                <span class="button">
                    Converter
                </span>
                <span class="button">
                    Finance
                </span>
            </div>
            <hr>
        </header>
        <main>
            <div class="result">
                0
                <hr>
            </div>
            <div class="pad-section">
                <div class="number-pad">
                    <div class="pad">1</div>
                    <div class="pad">2</div>
                    <div class="pad">3</div>
                    <div class="pad">4</div>
    
                    <div class="pad">5</div>
                    <div class="pad">6</div>
                    <div class="pad">7</div>
                    <div class="pad">8</div>
    
                    <div class="pad number">1</div>
                    <div class="pad number">2</div>
                    <div class="pad number">3</div>
                    <div class="pad">9</div>
                    
                    <div class="pad number">4</div>
                    <div class="pad number">5</div>
                    <div class="pad number">6</div>
                    <div class="pad">9</div>
    
                    <div class="pad number">7</div>
                    <div class="pad number">8</div>
                    <div class="pad number">9</div>
                    <div class="pad">9</div>
    
                    <div class="pad">9</div>
                    <div class="pad number">9</div>
                    <div class="pad">.</div>
                    <div class="pad answer">=</div>
                </div>
            </div>
        </main>
    </div>

    <!-- import javascript -->
    <script src="utils/makeDragable.js"></script>
    <script src="utils/operate.js"></script>
    <script src="index.js"></script>
</body>
</html>
